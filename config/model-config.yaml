# DeepAnalyze Model Configuration
# Supports any OpenAI-compatible endpoint (Ollama, vLLM, LM Studio, Claude API, etc.)

models:
  main:
    provider: openai-compatible
    endpoint: https://coding.dashscope.aliyuncs.com/v1
    apiKey: sk-sp-c8a9e3998a15481b8c068dd0ece39755
    model: qwen3.5-plus
    maxTokens: 32768
    supportsToolUse: true

  # Embedding model for vector search (optional, enables 3-way fusion search)
  # embedding:
  #   provider: openai-compatible
  #   endpoint: https://api.siliconflow.cn/v1
  #   apiKey: your-api-key
  #   model: BAAI/bge-m3
  #   dimension: 1024

  # VLM model for image analysis (optional, enables vlm_analyze tool)
  # vlm:
  #   provider: openai-compatible
  #   endpoint: https://api.siliconflow.cn/v1
  #   apiKey: your-api-key
  #   model: Qwen/Qwen2.5-VL-72B-Instruct
  #   maxTokens: 8192

defaults:
  main: main
  # embedding: embedding
  # vlm: vlm
